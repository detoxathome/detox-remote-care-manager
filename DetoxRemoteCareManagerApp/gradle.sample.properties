################################################################################
# runtime properties

# run updateConfig after changing these properties

ssaconfigBaseUrl=http://localhost:10000/servlets/detoxrcm

ssaconfigMysqlHost=detoxrcm-db
ssaconfigMysqlPort=3306
ssaconfigMysqlRootPassword=SECRET

ssaconfigDbNamePrefix=ssa
# 256 bit Base64 key
ssaconfigJwtSecretKey=SECRET
ssaconfigSecretSalt=SECRET

ssaconfigAdminEmail=SECRET
ssaconfigAdminPassword=SECRET

ssaconfigMailHost=localhost
ssaconfigMailUsername=
ssaconfigMailPassword=
ssaconfigMailSmtpTls=false
ssaconfigMailFrom=Detox@Home remote care manager <info@example.com>

ssaconfigTwilioAccountSid=ACaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
ssaconfigTwilioAuthToken=
ssaconfigTwilioVerifyServiceSid=VAaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa

ssaconfigWebUrl=http://localhost:10000/detoxrcm

# Optional values included in Detox@Home phone-link QR codes.
# Use local, production, or custom. If empty, the app resolves the environment
# from the API base URL, or keeps the current selection when no target hint is
# present.
ssaconfigMobileEnvironment=local
# mobileApiBaseUrl is the app-facing API URL including the API version. If it is
# empty, the service falls back to ssaconfigBaseUrl + /v{version}.
ssaconfigMobileApiBaseUrl=http://10.0.2.2:10000/servlets/detoxrcm/v6.1.0
# Firebase override fields are emitted automatically for local and custom QR
# environments when all four Firebase values below are configured. Set this to
# true to force emitting them, or false to force omitting them.
ssaconfigMobileFirebaseOverrides=false
ssaconfigFirebaseAppId=
ssaconfigFirebaseApiKey=
ssaconfigFirebaseProjectId=
ssaconfigFirebaseSenderId=

# Periodic Healthchecks.io middleware liveness ping interval in milliseconds.
ssaconfigHealthchecksGeneralPingIntervalMs=1800000

# Optional Detox ONS multi-instance config.
# Comma-separated instance IDs.
ssaconfigDetoxOnsInstances=staging
# Used when onsInstance parameter is omitted.
ssaconfigDetoxOnsDefaultInstance=staging
# Per-instance base URL and mTLS client credentials.
ssaconfigDetoxOnsInstance.staging.baseUrl=https://api-staging.ons.io
ssaconfigDetoxOnsInstance.staging.mtlsCertPath=/etc/detoxrcm/ons/client.pem
ssaconfigDetoxOnsInstance.staging.mtlsKeyPath=/etc/detoxrcm/ons/client.key

ssaconfigDataDir=/var/log/detoxrcm

################################################################################
# deployment properties

dockerTomcatUser=SECRET
dockerTomcatPassword=SECRET
dockerLogDir=/var/log/detoxrcm
dockerContext=default
dockerProject=detoxrcm
dockerTag=latest
