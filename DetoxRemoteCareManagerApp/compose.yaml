services:
    detoxrcm-tomcat:
        image: detoxrcm-tomcat:$DOCKER_TAG
        ports:
            - 10002:8080
            - 10003:8009
        volumes:
            - $LOG_DIR:/var/log/detoxrcm
        restart: unless-stopped
    detoxrcm-web:
        image: detoxrcm-web:$DOCKER_TAG
        volumes:
            - phpmyadmin-data:/var/www/phpmyadmin
        ports:
            - 10000:80
            - 10001:8081
        restart: unless-stopped
    detoxrcm-db:
        image: mariadb:11
        volumes:
            - mysql-data:/var/lib/mysql
        environment:
            MYSQL_ROOT_PASSWORD: $MYSQL_ROOT_PASSWORD
        ports:
            - 10004:3306
        restart: unless-stopped
    phpmyadmin:
        image: phpmyadmin:fpm-alpine
        volumes:
            - phpmyadmin-data:/var/www/html
        environment:
            PMA_HOST: detoxrcm-db
        restart: unless-stopped

volumes:
    mysql-data:
    phpmyadmin-data:
